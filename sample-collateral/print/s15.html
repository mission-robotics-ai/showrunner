<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="kit.css">
<style>
  @page { size: 8.5in 11in; margin: 0; }
  /* S15 — collateral card system (sibling of the announce card), LETTER PORTRAIT.
     Same stepped-tier composition as the 11x17 version, rescaled so it packs
     densely on the smaller page. */
  :root{
    --bg:#0b0e0c; --line:#232b1d; --ink:#d7e0cf; --green:#46e07a;
    --cream:#e8e6dd; --sponsor-label:#8a957c;
  }
  html,body{ background:var(--bg); overflow:hidden; }
  html{ width:8.5in; height:11in; }
  body.card{
    width:8.5in; height:11in; padding:0; display:block;
    background:var(--bg); color:var(--ink); position:relative; overflow:hidden;
    font-family:'Inter',system-ui,sans-serif;
  }
  .glow{ position:absolute; left:50%; top:46%; width:11in; height:8in; transform:translate(-50%,-50%);
    background:radial-gradient(ellipse 50% 50% at 50% 50%, rgba(70,224,122,0.32) 0%, rgba(42,140,77,0.10) 44%, rgba(11,14,12,0) 72%);
    pointer-events:none; z-index:0; }
  .glow2{ position:absolute; left:50%; top:80%; width:9in; height:4.5in; transform:translate(-50%,-50%);
    background:radial-gradient(ellipse 50% 50% at 50% 50%, rgba(70,224,122,0.14) 0%, rgba(42,140,77,0.05) 46%, rgba(11,14,12,0) 72%);
    pointer-events:none; z-index:0; }
  .dotsbg{ position:absolute; inset:0; z-index:0; pointer-events:none;
    background-image:radial-gradient(rgba(70,224,122,0.11) 1.3px, transparent 1.6px);
    background-size:15px 15px; background-position:center; }
  .frame{ position:absolute; inset:0; z-index:2; display:flex; flex-direction:column; padding:0.58in 0.6in 0.58in; }

  /* masthead — kit MR band, restyled cream-on-dark, + AprilTag */
  .masthead{ display:flex; align-items:center; justify-content:space-between;
    padding-bottom:0.16in; border-bottom:1px solid var(--green); }
  .mr-band{ display:flex; align-items:center; gap:0.12in; }
  .mr-band img.dots{ width:0.4in; height:0.4in; display:block; }
  .mr-band .name{ font-family:'Instrument Serif',Georgia,serif; font-weight:400; font-size:19pt;
    line-height:0.96; color:var(--cream); letter-spacing:0.005em; }
  .masthead img.tag{ width:0.44in; height:0.44in; image-rendering:pixelated; background:#fff; padding:0.04in; border-radius:2px; display:block; }

  /* body: POWERED-BY + three tiers spread to SPAN the full height, so the small
     page reads dense and full rather than a compact block floating in dark. */
  .body{ flex:1; display:flex; flex-direction:column; justify-content:space-between; align-items:flex-start; padding-top:0.34in; padding-bottom:0.06in; }
  .powered{ font-family:'Archivo Black',sans-serif; font-weight:400; text-transform:uppercase;
    font-size:33pt; letter-spacing:-0.012em; color:var(--cream); line-height:1;
    text-shadow:0 0 60px rgba(70,224,122,0.14); }

  .tier{ display:flex; align-items:center; width:100%; justify-content:space-between; }
  .tier img{ display:block; width:auto; }            /* height-driven; aspect preserved, never stretched */

  .lockup{ display:flex; align-items:center; gap:0.22in; }
  .lockup .wm-mr{ font-family:'Instrument Serif',Georgia,serif; font-weight:400; color:var(--cream);
    line-height:0.92; font-size:29pt; }
  .lockup .wm-savant{ font-family:'Inter',sans-serif; font-weight:500; text-transform:lowercase;
    color:var(--cream); font-size:37pt; letter-spacing:0; }
  .txtmark{ font-family:'Inter',sans-serif; font-weight:500; color:var(--cream); line-height:1; white-space:nowrap; }

  /* THREE unmistakable levels (optical). T1 hero · T2 ~60% · T3 ~42%. */
  .t1 img.orb    { height:1.0in; }
  .t1 img.savant { height:0.95in; }
  .t2 img.rerun  { height:0.4in; }
  .t2 img.modal  { height:0.37in; }
  .t2 img.nt     { height:0.4in; }
  .t3 img.livekit{ height:0.26in; }
  .t3 img.arduino{ height:0.48in; }
  .t3 img.northstar{ height:0.42in; }
  .t3 .txtmark   { font-size:15pt; }
</style>
</head>
<body class="card">
  <div class="glow"></div>
  <div class="glow2"></div>
  <div class="dotsbg"></div>
  <div class="frame">
    <div class="masthead">
      <div class="mr-band">
        <img class="dots" src="assets/dots-green.svg" alt="">
        <div class="name">Mission<br>Robotics</div>
      </div>
      <img class="tag" src="assets/tag36_11_00115.png" alt="">
    </div>

    <div class="body">
      <div class="powered">Powered by</div>
      <div class="tier t1">
        <div class="lockup"><img class="orb" src="assets/mr-orb-mark-bright.png" alt=""><div class="wm-mr">Mission<br>Robotics</div></div>
        <div class="lockup"><img class="savant" src="assets/savant-glyph-white.png" alt=""><div class="wm-savant">savant</div></div>
      </div>

      <div class="tier t2">
        <img class="rerun" src="assets/rerun-wordmark-white.svg" alt="Rerun">
        <img class="modal" src="assets/modal-white.svg" alt="Modal">
        <img class="nt" src="assets/nt-logo-white.svg" alt="New Theory">
      </div>

      <div class="tier t3">
        <img class="livekit" src="assets/livekit-wordmark-white.svg" alt="LiveKit">
        <img class="arduino" src="assets/arduino-white.svg" alt="Arduino">
        <span class="txtmark">Solo Tech</span>
        <img class="northstar" src="assets/northstar-white.png" alt="North Star">
      </div>
    </div>
  </div>
</body></html>
