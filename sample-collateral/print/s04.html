<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="kit.css">
<style>
  @page { size: 8.5in 11in; margin: 0; }
  /* ===================================================================
     S04 LOCKOUT PHONE — EDIT THIS ONE VALUE, THEN RE-RENDER.
     Replace the placeholder below with the real number, e.g. "415-555-0147".
     While it reads "TK", it ships behind a yellow highlight so it can't
     accidentally go to print unfilled. =================================== */
  :root { --lockout-phone: "415-TK-TKTK"; }
  .phone::before { content: var(--lockout-phone); }
  /* highlight stays ON until a real number is set. If you set a real number,
     also remove the "unfilled" class from the <div class="big mono phone ...> below. */
  .phone.unfilled { }
  .phone.unfilled::before {
    background: var(--tape); color: var(--black); padding: 0.04in 0.16in;
    border-radius: 6px; box-shadow: 0 0 0 3px rgba(23,24,26,0.9);
  }
</style>
</head>
<body class="yellow s85">
  <div class="band">
    <div class="brand"><img class="dots" src="assets/dots-dark.svg" alt=""><div class="bt">Mission<br>Robotics</div></div>
    <img class="tag" src="assets/tag36_11_00104.png" alt="">
  </div>
  <div class="grow">
    <div class="big" style="font-size: 62pt">This door locks<br>behind you</div>
    <div class="sm" style="font-weight: 600; font-size: 18pt; color: var(--black)">Locked out? Text or call:</div>
    <div class="big mono phone unfilled" style="font-size: 40pt; line-height: 1.1"></div>
    <div class="sm" style="font-size: 15pt">Overnight re-entry: same number. Someone is always up.</div>
  </div>
  <div class="footrow"><span>DO NOT PROP OPEN</span><span>SIGN 04</span></div>
</body></html>
