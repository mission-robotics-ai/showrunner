<html lang="en"><head><meta charset="utf-8">

</head>
<body class="tent">
  <!-- TOP panel: rotated 180 so it reads upright once the sheet folds down into a tent -->

    <div class="band">
      <div class="brand"><img class="dots" src="assets/dots-dark.svg" alt=""><div class="bt">Mission<br>Robotics</div></div>
      <img class="tag" src="assets/tag36_11_00103.png" alt="">

      <div class="big" style="font-size: 56pt">Wifi</div>
      <div class="sm mono" style="font-size: 19pt; line-height: 1.9; color: var(--black)">NETWORK&nbsp; <b>MissionRoboticsGuest</b><br>PASSWORD&nbsp; <b>TK-YOUR-REAL-PASSWORD-TK</b></div>
    </div>
  </div>

  <div class="half bottom">
    <div class="band">
      <div class="brand"><img class="dots" src="assets/dots-dark.svg" alt=""><div class="bt">Mission<br>Robotics</div></div>
      <img class="tag" src="assets/tag36_11_00103.png" alt="">

      <div class="sm mono" style="font-size: 19pt; line-height: 1.9; color: var(--black)">NETWORK&nbsp; <b>MissionRoboticsGuest</b><br>PASSWORD&nbsp; <b>TK-YOUR-REAL-PASSWORD-TK</b></div>
    </div>
