<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- brand tokens -->             <link rel="stylesheet" href="card-brand.css">
<!-- winners-card extensions -->  <link rel="stylesheet" href="card-winners.css">
<style>
  /* ===== card-winners-og-optA.html — LAYOUT + per-canvas font-SIZES ONLY =====
     1200x630. Brand fonts/colors/logo treatments come from card-brand.css;
     winners-specific treatments from card-winners.css.

     OPTION A — PODIUM FOCUS: eyebrow (context) -> big WINNERS hero (.wordmark,
     same device as the announce card) -> three place-items in rank order ->
     compact Rerun-bounty caption -> footer band (date LEFT, sponsor strip
     RIGHT, same component as the announce card's footer). */

  html,body{ width:1200px; height:630px; }

  .glow{ top:-420px; width:1300px; height:840px; }
  .dots{
    background-size:26px 26px;
    -webkit-mask-image:radial-gradient(ellipse 65% 70% at 52% 22%, #000 0%, rgba(0,0,0,0.3) 50%, transparent 75%);
            mask-image:radial-gradient(ellipse 65% 70% at 52% 22%, #000 0%, rgba(0,0,0,0.3) 50%, transparent 75%);
  }
  .orb{ right:-380px; bottom:-360px; width:640px; height:640px; }

  .frame{ padding:48px 56px 44px; }

  /* HOST lockup */
  .hosts{ gap:13px; height:62px; }
  .host{ gap:13px; }
  .host img.orbmark{ height:60px; width:60px; }
  .host img.savant{ height:48px; }
  .host .hostname.host-mr{ font-size:30px; }
  .host .hostname.host-savant{ font-size:27px; }
  .hosts .x{ font-size:26px; margin:0 1px; }

  /* BODY — centered in the space above the footer band */
  .body{ margin-top:auto; margin-bottom:auto; }
  .eyebrow{ font-size:15px; margin-bottom:12px; }
  .wordmark{ font-size:142px; }

  .podium{ margin-top:24px; gap:52px; }
  .place-item.rank-1 .place-chip{ font-size:20px; padding:7px 16px; border-radius:7px; margin-bottom:10px; }
  .place-item.rank-2 .place-chip,
  .place-item.rank-3 .place-chip{ font-size:16px; padding:6px 13px; border-radius:6px; margin-bottom:10px; }
  .place-item.rank-1 .place-team{ font-size:34px; }
  .place-item.rank-2 .place-team,
  .place-item.rank-3 .place-team{ font-size:26px; }

  .bounty-line{ margin-top:18px; font-size:16px; }

  /* FOOTER */
  .winners-footer{ padding-top:18px; }
  .winners-when{ font-size:20px; }
  .sponsors{ gap:22px; }
  .sponsors .group{ gap:9px; }
  .sponsors .group + .group{ padding-left:22px; }
  .sponsors .label{ font-size:13px; }
  .sponsors .row{ gap:22px; height:40px; }
  .sponsors img.newtheory{ height:25px; }
  .sponsors img.modal{ height:22px; }
  .sponsors img.rerun{ height:26px; }
  .sponsors img.livekit{ height:21px; }
  .sponsors img.northstar{ height:34px; }
  .sponsors .partner-mark{ gap:11px; }
  .sponsors .partner-name{ font-size:25px; }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="dots"></div>
  <img class="orb" src="logos/mr-orb-masked.png" alt="">
  <div class="frame">
    <div class="hosts">
      <div class="host">
        <img class="orbmark" src="logos/mr-orb-mark-bright.png" alt="">
        <span class="hostname host-mr">Mission Robotics</span>
      </div>
      <span class="x">&times;</span>
      <div class="host">
        <img class="savant" src="logos/savant-glyph-white.png" alt="">
        <span class="hostname host-savant">savant</span>
      </div>
    </div>

    <div class="body">
      <div class="eyebrow">Embodied Metal Hackathon &mdash; Results</div>
      <div class="wordmark">Winners</div>

      <div class="podium">
        <div class="place-item rank-1">
          <span class="place-chip">1st</span>
          <span class="place-team">Physical Agents</span>
        </div>
        <div class="place-item rank-2">
          <span class="place-chip">2nd</span>
          <span class="place-team">Soccerbot</span>
        </div>
        <div class="place-item rank-3">
          <span class="place-chip">3rd</span>
          <span class="place-team">Ctrl-Z</span>
        </div>
      </div>

      <div class="bounty-line">
        <span class="lbl">Rerun bounties</span> &nbsp; <span class="bounty-item"><b>Lama</b> &mdash; Viewer</span><span class="sep">&middot;</span><span class="bounty-item"><b>Physical Agents</b> &mdash; Query API</span><span class="sep">&middot;</span><span class="bounty-item"><b>Physical Agents</b> &mdash; Starter Port</span>
      </div>
    </div>

    <div class="winners-footer">
      <span class="winners-when">Jul 17&ndash;19 &middot; San Francisco</span>
      <div class="sponsors">
        <div class="group">
          <span class="label">Sponsored by</span>
          <div class="row">
            <img class="modal" src="logos/modal-white.png" alt="Modal">
            <img class="rerun" src="logos/sponsor-rerun-wordmark-white.svg" alt="Rerun">
            <img class="livekit" src="logos/livekit-wordmark-white.svg" alt="LiveKit">
          </div>
        </div>
        <div class="group">
          <span class="label">Partners</span>
          <div class="row">
            <img class="newtheory" src="logos/nt-logo-white.svg" alt="New Theory">
            <span class="partner-mark">
              <img class="northstar" src="logos/northstar-white.png" alt="North Star">
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
