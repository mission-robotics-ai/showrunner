<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- ALL brand fonts / colors / logo treatments live in card-brand.css -->
<link rel="stylesheet" href="card-brand.css">
<style>
  /* ===== card-square.html — LAYOUT + per-canvas font-SIZES ONLY =====
     1080×1080. No font-family / weight / case / color / logo treatment
     is defined here — those come exclusively from card-brand.css. */

  html,body{ width:1080px; height:1080px; }

  /* background placement for this canvas */
  .glow{ top:-520px; width:1400px; height:980px; }
  .dots{
    background-size:28px 28px;
    -webkit-mask-image:radial-gradient(ellipse 70% 60% at 50% 24%, #000 0%, rgba(0,0,0,0.3) 52%, transparent 76%);
            mask-image:radial-gradient(ellipse 70% 60% at 50% 24%, #000 0%, rgba(0,0,0,0.3) 52%, transparent 76%);
  }
  /* ---- Trossen wireframe background (robot-variant A · right-bleed) ---- */
  .robot{
    position:absolute;
    pointer-events:none;
    z-index:1;
    /* tint the white linework toward brand green + crush brightness so it
       sits behind the text as a faint blueprint, never competing */
    filter:brightness(0.9) sepia(1) hue-rotate(78deg) saturate(2.4) brightness(1.05);
    width:1180px; right:-360px; top:300px; opacity:0.13;
  }

  .frame{ padding:84px 84px 76px; }

  /* HOST lockup — inline, stacked MR wordmark */
  .hosts{ gap:18px; height:84px; }
  .host{ gap:18px; }
  .host img.orbmark{ height:82px; width:82px; }
  .host img.savant{ height:64px; }
  .host .hostname.host-mr{ font-size:42px; }
  .host .hostname.host-savant{ font-size:38px; }
  .hosts .x{ font-size:36px; margin:0 2px; }

  /* HERO — 3 lines: EMBODIED / METAL / HACKATHON, centered in the canvas */
  .hero{ margin-top:auto; margin-bottom:auto; }
  .wordmark{ font-size:124px; }

  /* META — date + tagline stacked */
  .meta{ margin-top:40px; }
  .dateplace{ font-size:32px; display:block; }
  .tagline{ font-size:50px; line-height:1; display:block; margin-top:16px; }

  /* FOOTER — square stacks: apply link on its own row, then a full-width
     sponsor strip (sponsors left, partner right) so three logos breathe. */
  .footer{ padding-top:42px; flex-direction:column; align-items:stretch; gap:30px; }
  .apply{ font-size:28px; }
  .sponsors{ width:100%; justify-content:space-between; align-items:flex-start; }
  .sponsors .group{ gap:12px; }
  .sponsors .group.sponsored{ align-items:flex-start; }
  .sponsors .group.partners{ align-items:flex-end; }
  .sponsors .group.sponsored .label{ text-align:left; }
  .sponsors .group.partners .label{ text-align:right; }
  .sponsors .group + .group{ border-left:none; padding-left:0; }
  .sponsors .label{ font-size:16px; }
  .sponsors .row{ gap:32px; height:52px; }
  .sponsors img.newtheory{ height:34px; }
  .sponsors img.modal{ height:30px; }
  .sponsors img.rerun{ height:35px; }
  .sponsors img.livekit{ height:29px; }
  .sponsors img.northstar{ height:44px; }
  .sponsors .partner-mark{ gap:15px; }
  .sponsors .partner-name{ font-size:33px; }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="dots"></div>
  <img class="robot" src="robot-trossen-transparent.png" alt="">
  <div class="frame">
    <div class="hosts">
      <div class="host">
        <img class="orbmark" src="logos/mr-orb-mark-bright.png" alt="">
        <span class="hostname host-mr">Mission Robotics</span>
      </div>
      <span class="x">&times;</span>
      <div class="host">
        <img class="savant" src="logos/savant-glyph-white.png" alt="">
        <span class="hostname host-savant">savant</span>
      </div>
    </div>

    <div class="hero">
      <div class="wordmark">Embodied<br>Metal<br>Hackathon</div>
      <div class="meta">
        <span class="dateplace">Jul 17-19 &middot; San Francisco</span>
        <span class="tagline">Make real robots do <span class="accent">real things.</span></span>
      </div>
    </div>

    <div class="footer">
      <span class="apply"><span class="arrow">Apply &rarr;</span> luma.com/embodied-metal</span>
      <div class="sponsors">
        <div class="group sponsored">
          <span class="label">Sponsored by</span>
          <div class="row">
            <img class="modal" src="logos/modal-white.png" alt="Modal">
            <img class="rerun" src="logos/sponsor-rerun-wordmark-white.svg" alt="Rerun">
            <img class="livekit" src="logos/livekit-wordmark-white.svg" alt="LiveKit">
          </div>
        </div>
        <div class="group partners">
          <span class="label">Partners</span>
          <div class="row">
            <img class="newtheory" src="logos/nt-logo-white.svg" alt="New Theory">
            <span class="partner-mark">
              <img class="northstar" src="logos/northstar-white.png" alt="North Star">
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
