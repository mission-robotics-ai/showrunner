<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- ALL brand fonts / colors / logo treatments live in card-brand.css -->
<link rel="stylesheet" href="card-brand.css">
<style>
  /* ===== card-og.html — LAYOUT + per-canvas font-SIZES ONLY =====
     1200×630. No font-family / weight / case / color / logo treatment
     is defined here — those come exclusively from card-brand.css. */

  html,body{ width:1200px; height:630px; }

  /* background placement for this canvas */
  .glow{ top:-420px; width:1300px; height:840px; }
  .dots{
    background-size:26px 26px;
    -webkit-mask-image:radial-gradient(ellipse 65% 70% at 52% 22%, #000 0%, rgba(0,0,0,0.3) 50%, transparent 75%);
            mask-image:radial-gradient(ellipse 65% 70% at 52% 22%, #000 0%, rgba(0,0,0,0.3) 50%, transparent 75%);
  }
  /* ---- Trossen wireframe background (robot-variant B · centered-faint) ---- */
  .robot{
    position:absolute;
    pointer-events:none;
    z-index:1;
    /* tint the white linework toward brand green + crush brightness so it
       sits behind the text as a faint blueprint, never competing */
    filter:brightness(0.9) sepia(1) hue-rotate(78deg) saturate(2.4) brightness(1.05);
    width:1500px; left:50%; transform:translateX(-50%); top:150px; opacity:0.10;
  }

  .frame{ padding:48px 56px 44px; }

  /* HOST lockup — inline, stacked MR wordmark */
  .hosts{ gap:13px; height:62px; }
  .host{ gap:13px; }
  .host img.orbmark{ height:60px; width:60px; }
  .host img.savant{ height:48px; }
  .host .hostname.host-mr{ font-size:30px; }
  .host .hostname.host-savant{ font-size:27px; }
  .hosts .x{ font-size:26px; margin:0 1px; }

  /* HERO — 2 lines: EMBODIED METAL / HACKATHON */
  .hero{ margin-top:auto; margin-bottom:auto; }
  .wordmark{ font-size:104px; }

  /* META — date + tagline inline on one row */
  .meta{ margin-top:18px; display:flex; align-items:baseline; gap:20px; flex-wrap:wrap; }
  .dateplace{ font-size:23px; }
  .tagline{ font-size:36px; line-height:1; }

  /* FOOTER */
  .footer{ padding-top:26px; }
  .apply{ font-size:22px; padding-bottom:4px; }
  .sponsors{ gap:22px; }
  .sponsors .group{ gap:9px; }
  .sponsors .group + .group{ padding-left:22px; }
  .sponsors .label{ font-size:13px; }
  .sponsors .row{ gap:22px; height:40px; }
  .sponsors img.newtheory{ height:25px; }
  .sponsors img.modal{ height:22px; }
  .sponsors img.rerun{ height:26px; }
  .sponsors img.livekit{ height:21px; }
  .sponsors img.northstar{ height:34px; }
  .sponsors .partner-mark{ gap:11px; }
  .sponsors .partner-name{ font-size:25px; }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="dots"></div>
  <img class="robot" src="robot-trossen-transparent.png" alt="">
  <div class="frame">
    <div class="hosts">
      <div class="host">
        <img class="orbmark" src="logos/mr-orb-mark-bright.png" alt="">
        <span class="hostname host-mr">Mission Robotics</span>
      </div>
      <span class="x">&times;</span>
      <div class="host">
        <img class="savant" src="logos/savant-glyph-white.png" alt="">
        <span class="hostname host-savant">savant</span>
      </div>
    </div>

    <div class="hero">
      <div class="wordmark">Embodied Metal<br>Hackathon</div>
      <div class="meta">
        <span class="dateplace">Jul 17-19 &middot; San Francisco</span>
        <span class="tagline">Make real robots do <span class="accent">real things.</span></span>
      </div>
    </div>

    <div class="footer">
      <span class="apply"><span class="arrow">Apply &rarr;</span> luma.com/embodied-metal</span>
      <div class="sponsors">
        <div class="group">
          <span class="label">Sponsored by</span>
          <div class="row">
            <img class="modal" src="logos/modal-white.png" alt="Modal">
            <img class="rerun" src="logos/sponsor-rerun-wordmark-white.svg" alt="Rerun">
            <img class="livekit" src="logos/livekit-wordmark-white.svg" alt="LiveKit">
          </div>
        </div>
        <div class="group">
          <span class="label">Partners</span>
          <div class="row">
            <img class="newtheory" src="logos/nt-logo-white.svg" alt="New Theory">
            <span class="partner-mark">
              <img class="northstar" src="logos/northstar-white.png" alt="North Star">
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
