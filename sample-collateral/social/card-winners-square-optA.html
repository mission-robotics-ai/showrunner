<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- brand tokens -->             <link rel="stylesheet" href="card-brand.css">
<!-- winners-card extensions -->  <link rel="stylesheet" href="card-winners.css">
<style>
  /* ===== card-winners-square-optA.html — LAYOUT + per-canvas font-SIZES ONLY =====
     1080x1080. Same construction as card-winners-og-optA.html, resized for
     the square canvas. Podium stays a 3-up horizontal row (square is wide
     enough at 912px content width); everything else scales up. */

  html,body{ width:1080px; height:1080px; }

  .glow{ top:-520px; width:1400px; height:980px; }
  .dots{
    background-size:28px 28px;
    -webkit-mask-image:linear-gradient(to bottom, #000 0%, #000 14%, rgba(0,0,0,0.35) 30%, transparent 46%);
            mask-image:linear-gradient(to bottom, #000 0%, #000 14%, rgba(0,0,0,0.35) 30%, transparent 46%);
  }
  .orb{ right:-400px; bottom:-400px; width:720px; height:720px; }

  .frame{ padding:84px 84px 76px; }

  /* HOST lockup */
  .hosts{ gap:18px; height:84px; }
  .host{ gap:18px; }
  .host img.orbmark{ height:82px; width:82px; }
  .host img.savant{ height:64px; }
  .host .hostname.host-mr{ font-size:42px; }
  .host .hostname.host-savant{ font-size:38px; }
  .hosts .x{ font-size:36px; margin:0 2px; }

  /* BODY — centered in the space above the footer band */
  .body{ margin-top:auto; margin-bottom:auto; }
  .eyebrow{ font-size:21px; margin-bottom:22px; }
  .wordmark{ font-size:150px; }

  .podium{ margin-top:48px; gap:38px; }
  .place-item.rank-1 .place-chip{ font-size:22px; padding:8px 18px; border-radius:8px; margin-bottom:14px; }
  .place-item.rank-2 .place-chip,
  .place-item.rank-3 .place-chip{ font-size:18px; padding:7px 15px; border-radius:7px; margin-bottom:14px; }
  .place-item.rank-1 .place-team{ font-size:38px; }
  .place-item.rank-2 .place-team,
  .place-item.rank-3 .place-team{ font-size:29px; }

  .bounty-line{ margin-top:34px; font-size:20px; line-height:1.5; max-width:820px; }

  /* FOOTER */
  .winners-footer{ padding-top:32px; flex-wrap:wrap; }
  .winners-when{ font-size:24px; }
  .sponsors{ gap:20px; margin-top:18px; }
  .sponsors .group{ gap:9px; }
  .sponsors .group + .group{ padding-left:20px; }
  .sponsors .label{ font-size:13px; }
  .sponsors .row{ gap:18px; height:32px; }
  .sponsors img.newtheory{ height:20px; }
  .sponsors img.modal{ height:18px; }
  .sponsors img.rerun{ height:21px; }
  .sponsors img.livekit{ height:17px; }
  .sponsors img.northstar{ height:28px; }
  .sponsors .partner-mark{ gap:9px; }
  .sponsors .partner-name{ font-size:20px; }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="dots"></div>
  <img class="orb" src="logos/mr-orb-masked.png" alt="">
  <div class="frame">
    <div class="hosts">
      <div class="host">
        <img class="orbmark" src="logos/mr-orb-mark-bright.png" alt="">
        <span class="hostname host-mr">Mission Robotics</span>
      </div>
      <span class="x">&times;</span>
      <div class="host">
        <img class="savant" src="logos/savant-glyph-white.png" alt="">
        <span class="hostname host-savant">savant</span>
      </div>
    </div>

    <div class="body">
      <div class="eyebrow">Embodied Metal Hackathon &mdash; Results</div>
      <div class="wordmark">Winners</div>

      <div class="podium">
        <div class="place-item rank-1">
          <span class="place-chip">1st</span>
          <span class="place-team">Physical Agents</span>
        </div>
        <div class="place-item rank-2">
          <span class="place-chip">2nd</span>
          <span class="place-team">Soccerbot</span>
        </div>
        <div class="place-item rank-3">
          <span class="place-chip">3rd</span>
          <span class="place-team">Ctrl-Z</span>
        </div>
      </div>

      <div class="bounty-line">
        <span class="lbl">Rerun bounties</span> &nbsp; <span class="bounty-item"><b>Lama</b> &mdash; Viewer</span><span class="sep">&middot;</span><span class="bounty-item"><b>Physical Agents</b> &mdash; Query API</span><span class="sep">&middot;</span><span class="bounty-item"><b>Physical Agents</b> &mdash; Starter Port</span>
      </div>
    </div>

    <div class="winners-footer">
      <span class="winners-when">Jul 17&ndash;19 &middot; San Francisco</span>
      <div class="sponsors">
        <div class="group">
          <span class="label">Sponsored by</span>
          <div class="row">
            <img class="modal" src="logos/modal-white.png" alt="Modal">
            <img class="rerun" src="logos/sponsor-rerun-wordmark-white.svg" alt="Rerun">
            <img class="livekit" src="logos/livekit-wordmark-white.svg" alt="LiveKit">
          </div>
        </div>
        <div class="group">
          <span class="label">Partners</span>
          <div class="row">
            <img class="newtheory" src="logos/nt-logo-white.svg" alt="New Theory">
            <span class="partner-mark">
              <img class="northstar" src="logos/northstar-white.png" alt="North Star">
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
